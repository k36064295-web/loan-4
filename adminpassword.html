<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:80px;
height:80px;
border-radius:50%;
background:white;
}

.logo h2{
color:#0047d4;
margin-top:10px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #cbd5e1;
border-radius:14px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#0047d4;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">

<img src="logo.png">

<h2>

ONETWO BANK ADMIN

</h2>

</div>

<input
type="text"
id="username"
placeholder="Admin Username">

<input
type="password"
id="password"
placeholder="Admin Password">

<button onclick="loginAdmin()">

Login

</button>

</div>

<script>

const adminUser = "01706365698";

const adminPass = "25802580";

function loginAdmin(){

let user =

document.getElementById("username").value;

let pass =

document.getElementById("password").value;

if(user==adminUser && pass==adminPass){

localStorage.setItem(
"admin",
"true"
);

window.location.href =
"admin.html";

}

else{

alert("Wrong Admin Info");

}

}

</script>

</body>

</html>
