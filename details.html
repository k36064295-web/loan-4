<style>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDoviQemxQYk-nel7Zc8cAzZhWJvxzbMcc",

authDomain: "loan-a87af.firebaseapp.com",

projectId: "loan-a87af",

storageBucket: "loan-a87af.firebasestorage.app",

messagingSenderId: "661290569837",

appId: "1:661290569837:web:0f03ecdfde2da0867def64",

measurementId: "G-2EMLCYHVWT"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.saveInfo =
async function(){

try{

let nid =
document.getElementById("nid").value;

let sex =
document.getElementById("sex").value;

let dob =
document.getElementById("dob").value;

let currentAddress =
document.getElementById("currentAddress").value;

let permanentAddress =
document.getElementById("permanentAddress").value;

let nomineeName =
document.getElementById("nomineeName").value;

let nomineeRelation =
document.getElementById("nomineeRelation").value;

let nomineeMobile =
document.getElementById("nomineeMobile").value;

if(
nid=="" ||
sex=="" ||
dob=="" ||
currentAddress=="" ||
permanentAddress=="" ||
document.getElementById("purpose").value=="" ||
nomineeName=="" ||
nomineeRelation=="" ||
nomineeMobile==""
){

alert("সব তথ্য পূরণ করুন");

return;

}

let mobile =
localStorage.getItem("userMobile");

if(!mobile){

alert("User Login Not Found");

return;

}

await setDoc(doc(db,"users",mobile),{

nid:nid,

sex:sex,

dob:dob,

currentAddress:currentAddress,

permanentAddress:permanentAddress,

purpose:
document.getElementById("purpose").value,

nomineeName:nomineeName,

nomineeRelation:nomineeRelation,

nomineeMobile:nomineeMobile

},{merge:true});

alert("Information Saved");

window.location.href =
"loan.html";

}

catch(error){

alert(error.message);

}

}

/* SIGNATURE */

const canvas =
document.getElementById("signature");

const ctx =
canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("touchstart",start);

canvas.addEventListener("touchend",end);

canvas.addEventListener("touchmove",draw);

function start(e){

drawing = true;

draw(e);

}

function end(){

drawing = false;

ctx.beginPath();

}

function draw(e){

if(!drawing) return;

e.preventDefault();

const rect =
canvas.getBoundingClientRect();

const x =
e.touches[0].clientX - rect.left;

const y =
e.touches[0].clientY - rect.top;

ctx.lineWidth = 2;

ctx.lineCap = "round";

ctx.strokeStyle = "black";

ctx.lineTo(x,y);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(x,y);

}

window.clearSignature =
function(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

</script>
